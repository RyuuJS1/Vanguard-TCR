<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard TCR</title>
    <style>
        .force-hide {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif;">
        <div style="display: flex; flex-direction: row; background: #1e293b; border-radius: 12px; overflow: hidden; max-width: 650px; width: 90%; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div style="padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div style="width: 15px; height: 15px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; margin-bottom: 15px;"></div>
                <h3 style="color: #38bdf8; margin: 0; letter-spacing: 1px; text-align: center; font-size: 1.2em;">¡ACCESO RESTRINGIDO!</h3>
                <p style="color: #94a3b8; font-size: 0.85em; margin: 10px 0 20px;">Ingrese PIN y URL para continuar</p>
                
                <input type="password" id="passwordInput" placeholder="PIN de 4 dígitos"
                    style="width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #334155; border-radius: 4px; font-family: monospace; outline: none; text-align: center;">
                
                <button onclick="verificarPassword()" 
                    style="width: 100%; margin-top: 15px; padding: 12px; background: #0284c7; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.3s;">
                    INGRESAR AL PANEL
                </button>
                
                <p id="login-error" style="color: #ef4444; font-size: 0.75em; margin-top: 10px; display: none;">Contraseña incorrecta</p>
            </div>

            <div style="background: #1e293b; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div style="width: 180px; height: 180px; background: white; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                    <img src="QRCode.png" alt="QR Code" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <span style="color: #38bdf8; font-size: 0.75em; margin-top: 15px; font-weight: bold; letter-spacing: 1px; text-align: center;">ESCANEAR PARA INGRESAR</span>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>DASHBOARD<small style="font-size: 0.5em; opacity: 0.7;">Vanguard TCR</small></h1>
            <div class="connection-status">
                <div id="status-led" class="led led-red"></div>
                <div id="status-badge" class="badge">Desconectado</div>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card stats-sidebar">
                <h3>📊 Administrador de Tareas</h3>
                <div class="stat-container">
                    <canvas id="statsChart"></canvas>
                </div>

                <div class="stat-item">
                    <div class="stat-info">
                        <span class="label">ALMACENAMIENTO</span>
                        <span id="disk-text" class="percent">0%</span>
                    </div>
                    <div class="progress-bar"><div id="disk-bar" style="width: 0%"></div></div>
                </div>

                <div class="net-section">
                    <span class="label">TRÁFICO DE RED</span>
                    <div class="net-display">
                        <div class="net-val">▼ <span id="net-down">0 KB/s</span></div>
                        <div class="net-val">▲ <span id="net-up">0 KB/s</span></div>
                    </div>
                </div>
            </section>

            <section class="card control-main">
                <h3>🛠️ Panel de Control</h3>
                
                <div class="control-row-inline">
                    <div class="input-group">
                        <label class="label">IP DEL SERVIDOR</label>
                        <div class="flex-row">
                            <input type="text" id="ipInput" placeholder="127.0.0.1" value="127.0.0.1">
                            <button id="connectBtn" onclick="toggleConexion()" class="btn btn-connect">Conectar</button>
                        </div>
                    </div>
                </div>

                <div class="control-row-stacked">
                    <label class="label">ENVIAR COMANDO</label>
                    <input type="text" id="commandInput" placeholder="Escribe HELP para ver comandos disponibles" disabled>
                    <div class="center-btn">
                        <button id="execBtn" onclick="procesarComando()" class="btn btn-disabled" disabled>Ejecutar Comando</button>
                    </div>
                </div>
            </section>

            <section class="card terminal-bottom">
                <h3>📺 Terminal de Salida</h3>
                <div id="console" class="console-output">> Sistema listo...</div>
            </section>
        </main>
    </div>

    <div id="screen-modal" class="force-hide" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; display: none;">
        <div style="position: relative; width: 90%; max-width: 1000px; display: flex; flex-direction: column; align-items: center;">
            <img id="screen-img" src="" style="width: 100%; border: 2px solid #38bdf8; border-radius: 8px;">
            
            <button onclick="cerrarModal()" 
                    style="position: absolute; top: -60px; right: 0; background: #ef4444; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10001;">
                CERRAR [X]
            </button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
